<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Gym Trainer</title>
<link rel="manifest" href="manifest.json">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Gym Trainer">
<meta name="theme-color" content="#0c0c0d">
<link rel="apple-touch-icon" href="apple-touch-icon.png">
<link rel="stylesheet" href="css/app.css">
</head>
<body>

<div class="app">
  <header class="topbar">
    <div>
      <div class="topbar-title" id="tb-title">Heute</div>
      <div class="topbar-sub" id="tb-sub"></div>
    </div>
    <div class="topbar-actions">
      <button class="iconbtn" id="btn-settings" aria-label="Einstellungen"></button>
    </div>
  </header>

  <main>
    <div class="view" id="v-home"></div>
    <div class="view" id="v-plans"></div>
    <div class="view" id="v-stats"></div>
    <div class="view" id="v-history"></div>
  </main>
</div>

<nav class="bottomnav" id="bottomnav"></nav>

<!-- Workout-Player (Vollbild) -->
<div class="player" id="player"></div>

<!-- Pausen-Timer -->
<div class="rest-overlay" id="rest-overlay"></div>

<script type="module" src="js/app.js"></script>
</body>
</html>
